services:
  nginx:
    container_name: nginx
    build: ./nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./certs:/etc/nginx/certs
    depends_on:
      jupyterhub:
        condition: service_healthy
    networks:
      - imars-jupyterhub_default

  jupyterhub:
    build: jupyterhub
    container_name: jupyterhub
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/hub/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    volumes:
      # jupyterhub docker spawner setup
      - ./jupyterhub:/srv/jupyterhub
      - /etc/passwd:/etc/passwd:ro
      - /etc/shadow:/etc/shadow:ro
      - /etc/group:/etc/group:ro
      - /var/run/docker.sock:/var/run/docker.sock  # so jupyterhub can spawn a docker container
      # data directories
#      - tpa_pgs:/srv/pgs
#      - yin:/srv/yin
#      - /srv/pgs:/srv/pgs
#      - /srv/yin:/srv/yin
    networks:
      - imars-jupyterhub_default  # Must match the network name
#    environment:
#      - JUPYTERHUB_LOG_LEVEL=DEBUG

  # build block for juptyerhub-user-notebook docker containers:
  user-notebook:
    build: ./user-notebook  # path where your user Dockerfile lives
    image: imars-scipy-notebook
    environment:
      - MATLAB_ROOT=/home/jovyan/MATLAB/R2021b
      - MLM_LICENSE_FILE=/home/jovyan/MATLAB/R2021b/licenses/network.lic
#    volumes:
#      - tpa_pgs:/srv/pgs
#      - yin:/srv/yin
    networks:
      - imars-jupyterhub_default
  # NOTE: volumes (for yin||pgs||imars-objects) are defined in
  #       juptyer/jupyterhub_config.py under c.DockerSpawner.volumes

networks:
  imars-jupyterhub_default:
    external: true    

